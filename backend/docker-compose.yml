services:
  db:
    image: postgres:16-alpine
    container_name: quiz_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quiz_platform
    ports:
      - "5432:5432"
    volumes:
      - quiz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quiz_pgdata:
